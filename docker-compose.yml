services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agileboard
    ports:
      - "5432:5432"
    volumes:
      - agileboard_pgdata:/var/lib/postgresql/data

volumes:
  agileboard_pgdata:
